<!-- /page/newsletter.html -->
<section class="newsletter-section py-5 bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-xl-6">
        <div class="card border-0 shadow-lg">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div
                class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                style="width:80px;height:80px">
                <i class="bi bi-envelope-paper fs-2"></i>
              </div>
              <h1 class="h2 fw-bold mb-2">Resta aggiornato</h1>
              <p class="lead text-muted mb-0">Novita su progetti, articoli tecnici e consigli di sviluppo.</p>
            </div>

            <div id="newsletter-success" class="alert alert-success d-none" role="alert"></div>
            <div id="newsletter-error" class="alert alert-danger d-none" role="alert"></div>

            <form id="newsletterForm" novalidate>
              <!-- honeypot anti-bot -->
              <input type="text" name="website" autocomplete="off" tabindex="-1"
                style="position:absolute;left:-9999px;opacity:0" aria-hidden="true">
              <input type="hidden" name="startedAt" value="">

              <div class="mb-4">
                <label for="subEmail" class="form-label fw-semibold">
                  La tua email <span class="text-danger">*</span>
                </label>
                <input type="email" id="subEmail" name="email" class="form-control form-control-lg" required
                  autocomplete="email" placeholder="nome@esempio.com" maxlength="100">
                <div id="subEmail-error" class="invalid-feedback">Inserisci un email valida.</div>
              </div>

              <div class="mb-4">
                <label for="newsletter-frequency" class="form-label fw-semibold">Frequenza</label>
                <select id="newsletter-frequency" name="frequency" class="form-select">
                  <option value="weekly">Settimanale</option>
                  <option value="biweekly" selected>Bisettimanale</option>
                  <option value="monthly">Mensile</option>
                </select>
              </div>

              <div class="mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="privacy-consent" name="privacyConsent" required>
                  <label class="form-check-label small" for="privacy-consent">
                    Acconsento al trattamento dei dati. <span class="text-danger">*</span>
                  </label>
                  <div id="privacy-consent-error" class="invalid-feedback">Consenso obbligatorio.</div>
                </div>
              </div>

              <button type="submit" id="newsletter-submit" class="btn btn-success btn-lg w-100 py-2 fw-semibold">
                <span>Iscriviti</span>
                <span class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
              </button>

              <div id="subMsg" class="mt-3"></div>
            </form>
          </div>
        </div>

        <div class="text-center mt-4">
          <button type="button" id="newsletter-unsubscribe" class="btn btn-outline-secondary btn-sm">
            Disiscrivimi
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
