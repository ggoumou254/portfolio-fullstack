<!-- /page/projects.html -->
<section class="container py-5">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h1 class="mb-0">Progetti</h1>
    <button class="btn btn-outline-secondary btn-sm" id="projects-refresh" type="button">
      <i class="bi bi-arrow-clockwise me-1"></i>Aggiorna
    </button>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-6">
      <div class="input-group">
        <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
        <input id="projects-search" type="search" class="form-control" placeholder="Cerca progetto, tecnologia...">
      </div>
    </div>
    <div class="col-md-3">
      <select id="projects-filter" class="form-select">
        <option value="all" selected>Tutte le categorie</option>
        <option value="web">Web</option>
        <option value="mobile">Mobile</option>
        <option value="desktop">Desktop</option>
        <option value="api">API</option>
        <option value="library">Library</option>
        <option value="tool">Tool</option>
        <option value="other">Altro</option>
      </select>
    </div>
  </div>

  <div id="project-error" class="alert alert-danger d-none" role="alert"></div>

  <div id="project-empty" class="text-center py-5 d-none">
    <i class="bi bi-inbox display-1 text-muted"></i>
    <h4 class="mt-3 text-muted">Nessun progetto trovato</h4>
    <p class="text-muted">Prova a modificare i filtri o la ricerca.</p>
  </div>

  <div id="project-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-3"></div>
</section>
