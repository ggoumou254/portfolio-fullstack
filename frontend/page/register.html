<!-- /page/register.html -->
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus fs-1 text-primary"></i>
            <h1 class="h3 fw-bold mt-2 mb-1">Registrazione</h1>
            <p class="text-muted mb-0">Crea un nuovo account.</p>
          </div>

          <div id="register-success" class="alert alert-success d-none" role="alert"></div>
          <div id="register-error" class="alert alert-danger d-none" role="alert"></div>

          <form id="registerForm" novalidate>
            <div class="mb-3">
              <label for="name" class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
              <input type="text" id="name" class="form-control" required autocomplete="name" placeholder="Il tuo nome"
                minlength="2" maxlength="50">
              <div class="invalid-feedback">Inserisci il nome (min 2 caratteri).</div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
              <input type="email" id="email" class="form-control" required autocomplete="email"
                placeholder="nome@esempio.com" maxlength="100">
              <div class="invalid-feedback">Inserisci un email valida.</div>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" id="password" class="form-control" required autocomplete="new-password"
                  placeholder="Minimo 8 caratteri" minlength="8">
                <button id="toggle-password" type="button" class="btn btn-outline-secondary">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="invalid-feedback">Password non valida (min 8 caratteri).</div>
              <small class="text-muted">Minimo 8 caratteri con maiuscola, numero e simbolo.</small>
            </div>

            <div class="mb-4">
              <label for="password2" class="form-label fw-semibold">Conferma Password <span
                  class="text-danger">*</span></label>
              <input type="password" id="password2" class="form-control" required autocomplete="new-password"
                placeholder="Ripeti la password" minlength="8">
              <div class="invalid-feedback">Le password non coincidono.</div>
            </div>

            <button id="register-submit" type="submit" class="btn btn-primary w-100 btn-lg">
              <span class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
              <span>Registrati</span>
            </button>

            <div class="text-center mt-3">
              <span class="text-muted small">Hai gia un account?</span>
              <a href="#login" class="text-decoration-none ms-1 small" data-page="login">Accedi</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
