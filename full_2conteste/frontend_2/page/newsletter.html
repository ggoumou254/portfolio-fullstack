
<!--newsletter.html-->
<section class="container py-4">
  <h2 class="mb-3">Newsletter</h2>

  <form id="newsletterForm" novalidate>
    <div class="mb-3">
      <label for="subEmail" class="form-label">La tua email</label>
      <input type="email" id="subEmail" name="email" class="form-control" required autocomplete="email" />
    </div>
    <button type="submit" id="newsletter-submit" class="btn btn-success">Iscriviti</button>
    <div id="subMsg" class="mt-3"></div>
  </form>
</section>
